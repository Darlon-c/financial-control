<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <section>
      <div>
        <input class="border" type="text" id="inputName" placeholder="Descrição">
        <input class="border" type="number" id="price" placeholder="Valor">
        <select class="border" id="type">
          <option value="entry">Entrada</option>
          <option value="exit">Saída</option> 
        </select>
        <select class="border" id="categories">
          <option value="alimentação">Alimentação</option>
          <option value="transporte">Transporte</option>
          <option value="lazer">Lazer</option>
          <option value="outros">Outros</option>
        </select>
        <input class="border" type="date">
        <button class="px-2 py-2 font-sans bg-indigo-500 rounded-md" id="register">Registrar</button>
      </div>
    </section>


    <script src="/Js/index.js"></script>
  </body>
</html>
