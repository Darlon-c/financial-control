<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <section>
      <div class="grid grid-cols-3 gap-5">
        <div class="grid col-span-1 py-4 gap-7">
          <input
            class="text-center border rounded-xl"
            type="text"
            id="inputName"
            placeholder="Descrição"
          />
          <input
            class="text-center border rounded-lg"
            type="number"
            id="price"
            placeholder="Valor"
          />
          <select class="text-center border rounded-lg" id="type">
            <option value="entry">Entrada</option>
            <option value="exit">Saída</option>
          </select>
          <select class="text-center border rounded-lg" id="categories">
            <option value="alimentação">Alimentação</option>
            <option value="transporte">Transporte</option>
            <option value="lazer">Lazer</option>
            <option value="outros">Outros</option>
          </select>
          <input class="border rounded-xl" type="date" id="date" />
          <button
            class="px-2 py-2 font-sans bg-indigo-500 rounded-md"
            id="register"
          >
            Registrar
          </button>
        </div>

        <!-- lista de registro -->
        <div class="grid col-span-2">
          <div id="listOfRegister"></div>
          <div id="totalBalance"></div>
        </div>

        <!--  -->
        <div class="grid col-span-1">
          <h1>filtros valor totais</h1>
          <div>
            <select id="filterSelect">
              <option value="all">Todos</option>
              <option value="entry">Entradas</option>
              <option value="exit">Saídas</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <script src="/Js/index.js"></script>
  </body>
</html>
